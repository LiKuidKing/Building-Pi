version: '3.8'

services:
  dashboard:
    build: .
    container_name: doug_dashboard
    restart: always # Keeps it running on reboots
    network_mode: "host" # Crucial! Allows UDP broadcasts (47808) to reach the physical network
    # Note: Because of 'host' mode, 'ports' mapping is ignored. The container will bind to Port 80 natively.
